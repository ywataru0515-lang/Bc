<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>BC DERBY — HOST v3</title>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const firebaseConfig = {
  apiKey:"AIzaSyB_cqkmI6Uoly5T-8PqENzPlaMkc62Z05M",
  authDomain:"bc-derby.firebaseapp.com",
  databaseURL:"https://bc-derby-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"bc-derby",
  storageBucket:"bc-derby.firebasestorage.app",
  messagingSenderId:"498397503926",
  appId:"1:498397503926:web:0c3163d1d543f8fe0d6117"
};
const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
window._fbDb=db;window._fbRef=ref;window._fbSet=set;window._fbGet=get;window._fbOnValue=onValue;window._fbReady=true;
document.dispatchEvent(new Event('firebase-ready'));
</script>
<style>
:root{
  --gold:#f5c842;--gold2:#c9973a;--glow:rgba(245,200,66,0.3);
  --ok:#33dd66;--red:#cc1f1f;--red2:#ff4444;
  --dark:#060f06;--bg2:#0a1a0a;--border:#7a5e18;
  --cream:#f5ead6;--cream2:#e0cfa0;--muted:#6a8a6a;
  --pb2:#2a4a8a;--pg:#7ab8ff;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Hiragino Kaku Gothic ProN','Meiryo','Yu Gothic',sans-serif;background:var(--dark);color:var(--cream);overflow:hidden;}
#app{display:grid;grid-template-rows:auto auto 1fr;height:100vh;}

/* TOPBAR */
#topbar{background:linear-gradient(180deg,#0d200d,#060f06);border-bottom:2px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.logo{font-family:Georgia,serif;font-style:italic;font-size:22px;color:var(--gold);letter-spacing:4px;}
.pill{font-family:'Courier New',monospace;font-size:10px;letter-spacing:1.5px;padding:3px 9px;border-radius:3px;background:rgba(0,0,0,.5);border:1px solid var(--border);color:var(--gold2);}
.pill.live{border-color:#883333;color:#ff6666;animation:livePulse 1.8s ease-in-out infinite;}
.pill.ok{border-color:#0a7a0a;color:#44dd88;}
.pill.err{border-color:#880808;color:#ff5555;}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(200,30,30,.4)}50%{box-shadow:0 0 0 4px transparent}}

/* TABS */
#tabbar{background:#050e05;border-bottom:2px solid var(--border);display:flex;padding:0 10px;gap:2px;overflow-x:auto;flex-shrink:0;}
.tab{font-family:'Trebuchet MS',sans-serif;font-size:13px;letter-spacing:2px;padding:9px 16px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .18s;border-bottom:3px solid transparent;position:relative;top:2px;white-space:nowrap;}
.tab:hover{color:var(--cream);}
.tab.on{color:var(--gold);border-bottom-color:var(--gold);background:rgba(245,200,66,.06);}
.tab.ptab.on{color:var(--pg);border-bottom-color:var(--pg);background:rgba(122,184,255,.06);}

/* MAIN */
#main{overflow:hidden;}
.panel{display:none;height:100%;overflow:hidden;}
.panel.on{display:flex;flex-direction:column;}

/* BET PANEL */
#panel-bet{flex-direction:row;}
#topic-nav{width:190px;min-width:150px;background:var(--bg2);border-right:2px solid var(--border);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;gap:2px;padding:8px 6px;}
.tnav-btn{font-family:'Trebuchet MS',sans-serif;font-size:12px;padding:9px 10px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;text-align:left;transition:all .18s;}
.tnav-btn:hover{background:rgba(245,200,66,.05);color:var(--cream);}
.tnav-btn.on{background:rgba(245,200,66,.1);border-color:var(--border);color:var(--gold);}
.tnav-btn.pon.on{background:rgba(122,184,255,.1);border-color:var(--pb2);color:var(--pg);}
.tnav-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle;}
.tnav-total{font-size:10px;color:var(--muted);display:block;margin-top:2px;font-family:'Courier New',monospace;}
#bet-content{flex:1;overflow-y:auto;padding:14px 16px;}
#bet-content::-webkit-scrollbar{width:4px;}
#bet-content::-webkit-scrollbar-thumb{background:var(--border);}

/* ODDS BAR */
.odds-bar{display:flex;gap:8px;flex-wrap:wrap;padding:10px 16px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--border);}
.odds-card{flex:1;min-width:90px;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center;transition:border-color .2s;}
.odds-card.winner{border-color:var(--gold);background:rgba(245,200,66,.08);}
.odds-card-name{font-family:'Trebuchet MS',sans-serif;font-size:12px;font-weight:700;color:var(--cream2);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.odds-card-val{font-family:'Courier New',monospace;font-size:22px;font-weight:700;color:var(--gold);}
.odds-card-val.hot{color:var(--red2);animation:hotFlash 1s ease-in-out infinite;}
.odds-card-val.cold{color:#88aaff;}
.odds-card-total{font-family:'Courier New',monospace;font-size:10px;color:var(--muted);margin-top:2px;}
@keyframes hotFlash{0%,100%{opacity:1}50%{opacity:.5}}

/* BET TABLE */
.topic-card{background:linear-gradient(135deg,rgba(10,40,10,.96),rgba(6,15,6,.97));border:2px solid var(--border);border-radius:12px;overflow:hidden;position:relative;}
.topic-card.pcard{border-color:var(--pb2);}
.topic-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),transparent);}
.topic-card.pcard::before{background:linear-gradient(90deg,transparent,var(--pg),#4a7abf,transparent);}
.topic-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
.topic-num{font-family:'Courier New',monospace;font-size:10px;color:var(--gold2);letter-spacing:3px;}
.topic-num.pnum{color:var(--pg);}
.topic-name{font-family:'Trebuchet MS',sans-serif;font-size:20px;font-weight:700;letter-spacing:2px;}
.topic-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.total-badge{font-family:'Courier New',monospace;font-size:11px;padding:3px 10px;background:rgba(245,200,66,.1);border:1px solid var(--border);border-radius:20px;color:var(--gold);}
.st-badge{font-family:'Trebuchet MS',sans-serif;font-size:11px;letter-spacing:2px;padding:3px 10px;border-radius:4px;border:1px solid;}
.st-open{background:rgba(0,180,0,.15);border-color:#0a7a0a;color:#44dd44;}
.st-closed{background:rgba(200,0,0,.15);border-color:#880808;color:#ff5555;}
.st-decided{background:rgba(245,200,66,.15);border-color:var(--border);color:var(--gold);}
.table-wrap{overflow-x:auto;padding:10px 14px;}
.bet-tbl{width:100%;border-collapse:separate;border-spacing:0;}
.bet-tbl th{font-family:'Trebuchet MS',sans-serif;font-size:11px;letter-spacing:1px;color:var(--gold2);padding:6px 8px;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;background:#0a1a0a;z-index:2;}
.bet-tbl th.th-team{text-align:left;min-width:90px;}
.bet-tbl td{padding:5px 7px;text-align:center;border-bottom:1px solid rgba(120,90,20,.12);vertical-align:middle;font-size:12px;}
.bet-tbl td.td-team{text-align:left;font-weight:700;font-size:12px;white-space:nowrap;}
.bet-tbl tr:hover td{background:rgba(245,200,66,.03);}
.bet-cell-val{font-family:'Courier New',monospace;font-size:13px;color:var(--gold);font-weight:700;}
.bet-cell-pred{font-family:'Courier New',monospace;font-size:9px;color:var(--ok);margin-top:1px;}
.bet-cell-empty{color:var(--muted);font-size:11px;}
.row-total td{background:rgba(245,200,66,.05);font-family:'Courier New',monospace;font-size:11px;color:var(--gold2);border-top:1px solid rgba(120,90,20,.3);}
.row-payout td{background:rgba(0,200,50,.07);font-family:'Courier New',monospace;font-size:12px;color:var(--ok);}

/* BUTTONS */
.btn{font-family:'Trebuchet MS',sans-serif;font-size:12px;letter-spacing:2px;padding:6px 14px;border-radius:5px;border:none;cursor:pointer;transition:all .15s;}
.btn-gold{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#000;font-weight:700;}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 14px var(--glow);}
.btn-red{background:linear-gradient(135deg,#700,var(--red));color:#fff;}
.btn-out{background:transparent;border:1px solid var(--border);color:var(--cream2);}
.btn-out:hover{border-color:var(--gold);color:var(--gold);}
.btn-sm{font-size:10px;letter-spacing:1px;padding:4px 10px;}

/* RANKING */
#panel-ranking{overflow:hidden;}
.ranking-wrap{flex:1;overflow-y:auto;padding:16px;}
.podium-area{display:flex;align-items:flex-end;justify-content:center;gap:12px;padding:20px 16px 0;min-height:200px;}
.podium-item{display:flex;flex-direction:column;align-items:center;gap:6px;}
.podium-rank{font-family:Georgia,serif;font-style:italic;color:var(--gold);text-shadow:0 0 16px var(--glow);}
.podium-name{font-family:'Trebuchet MS',sans-serif;font-weight:700;color:var(--cream);text-align:center;}
.podium-pts{font-family:'Courier New',monospace;color:var(--gold);}
.podium-gains{font-family:'Courier New',monospace;color:var(--muted);text-align:center;}
.podium-base{border-radius:8px 8px 0 0;width:100%;display:flex;align-items:center;justify-content:center;}
.p1 .podium-rank{font-size:48px;}.p1 .podium-name{font-size:20px;}.p1 .podium-pts{font-size:22px;}
.p1 .podium-base{height:100px;background:linear-gradient(180deg,rgba(245,200,66,.25),rgba(245,200,66,.05));border:2px solid var(--gold);}
.p1{order:2;flex:1.4;}
.p2 .podium-rank{font-size:34px;color:#b8b8b8;}.p2 .podium-name{font-size:16px;color:#b8b8b8;}.p2 .podium-pts{font-size:17px;color:#b8b8b8;}
.p2 .podium-base{height:70px;background:linear-gradient(180deg,rgba(180,180,180,.15),rgba(180,180,180,.03));border:1px solid #555;}
.p2{order:1;flex:1;}
.p3 .podium-rank{font-size:26px;color:#c07830;}.p3 .podium-name{font-size:14px;color:#c07830;}.p3 .podium-pts{font-size:15px;color:#c07830;}
.p3 .podium-base{height:50px;background:linear-gradient(180deg,rgba(192,120,48,.15),rgba(192,120,48,.03));border:1px solid #664422;}
.p3{order:3;flex:1;}
.rank-list{display:flex;flex-direction:column;gap:4px;margin-top:0;padding:0 4px 20px;}
.rank-row{display:grid;grid-template-columns:40px 1fr repeat(5,48px) 70px;align-items:center;gap:8px;padding:7px 12px;background:rgba(0,0,0,.35);border:1px solid rgba(120,90,20,.2);border-radius:7px;transition:background .2s;}
.rank-row:hover{background:rgba(245,200,66,.04);}
.rr-num{font-family:Georgia,serif;font-size:16px;text-align:center;color:var(--muted);}
.rr-name{font-family:'Trebuchet MS',sans-serif;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rr-gain{font-family:'Courier New',monospace;font-size:10px;text-align:center;}
.gain-up{color:var(--ok);}.gain-dn{color:var(--red2);}.gain-na{color:var(--muted);}
.rr-pts{font-family:'Courier New',monospace;font-size:15px;color:var(--gold);text-align:right;font-weight:700;}
.rank-header{display:grid;grid-template-columns:40px 1fr repeat(5,48px) 70px;gap:8px;padding:4px 12px 8px;border-bottom:1px solid var(--border);margin-bottom:6px;}
.rank-header span{font-family:'Courier New',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);text-align:center;}
.rank-header span:nth-child(2){text-align:left;}
.rank-header span:last-child{text-align:right;}
.delta{font-family:'Courier New',monospace;font-size:9px;padding:1px 5px;border-radius:8px;margin-left:4px;}
.delta-up{background:rgba(0,220,80,.14);color:#44ee88;}.delta-dn{background:rgba(230,40,40,.14);color:#ff5555;}.delta-eq{background:rgba(100,100,100,.14);color:var(--muted);}

/* ADMIN */
#panel-admin{overflow-y:auto;padding:14px 16px;gap:10px;}
.admin-sec{background:rgba(0,0,0,.45);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.admin-ttl{font-family:'Trebuchet MS',sans-serif;font-size:14px;letter-spacing:3px;color:var(--gold);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-lbl{font-family:'Courier New',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);}
.form-inp{background:rgba(0,0,0,.5);border:1px solid var(--border);border-radius:5px;padding:6px 10px;color:var(--cream);font-size:13px;outline:none;transition:border-color .15s;}
.form-inp:focus{border-color:var(--gold);}
.action-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:2000;display:none;align-items:center;justify-content:center;}
.modal-bg.on{display:flex;}
.modal{background:linear-gradient(135deg,#0a2a0a,#060f06);border:2px solid var(--gold);border-radius:14px;padding:28px;max-width:400px;width:92%;box-shadow:0 0 50px var(--glow);text-align:center;}
.modal-title{font-family:Georgia,serif;font-style:italic;font-size:20px;color:var(--gold);margin-bottom:14px;}
.modal-body{font-size:13px;color:var(--cream2);line-height:1.8;margin-bottom:16px;}
.modal-sel{width:100%;background:rgba(0,0,0,.6);border:1px solid var(--gold);border-radius:7px;color:var(--cream);font-size:14px;padding:8px 12px;outline:none;margin-bottom:16px;font-family:'Trebuchet MS',sans-serif;}
.modal-btns{display:flex;gap:10px;justify-content:center;}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--dark);z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .5s;}
#loading.hidden{opacity:0;pointer-events:none;}
.ld-title{font-family:Georgia,serif;font-style:italic;font-size:48px;color:var(--gold);text-shadow:0 0 30px var(--glow);animation:glow 1.2s ease-in-out infinite alternate;}
.ld-spin{width:44px;height:44px;border-radius:50%;border:4px solid var(--border);border-top-color:var(--gold);animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{from{text-shadow:0 0 20px var(--glow)}to{text-shadow:0 0 50px rgba(245,200,66,.7)}}

#toast{position:fixed;bottom:20px;right:20px;background:rgba(8,28,8,.97);border:2px solid var(--gold);color:var(--gold);padding:10px 18px;border-radius:7px;font-family:'Trebuchet MS',sans-serif;font-size:13px;letter-spacing:2px;transform:translateY(60px);opacity:0;transition:all .3s;z-index:8000;box-shadow:0 0 20px var(--glow);}
#toast.on{transform:translateY(0);opacity:1;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--dark);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div id="loading">
  <div class="ld-title">BC DERBY</div>
  <div class="ld-spin"></div>
  <div style="font-family:'Courier New',monospace;font-size:11px;letter-spacing:3px;color:var(--gold2)" id="ld-msg">接続中...</div>
</div>
<div class="modal-bg" id="win-modal">
  <div class="modal">
    <div class="modal-title">🏆 結果確定</div>
    <div class="modal-body" id="win-modal-body"></div>
    <select class="modal-sel" id="win-sel"></select>
    <div class="modal-btns">
      <button class="btn btn-gold" onclick="confirmWin()">確定・配当計算</button>
      <button class="btn btn-out" onclick="closeWinModal()">キャンセル</button>
    </div>
  </div>
</div>
<div id="app">
  <div id="topbar">
    <div class="logo">♠ BC DERBY HOST</div>
    <div class="pill live">● LIVE</div>
    <div class="pill" id="clock">--:--:--</div>
    <div class="pill" id="fb-status">Firebase...</div>
    <div class="pill" id="last-sync">更新: —</div>
  </div>
  <div id="tabbar">
    <button class="tab on" data-panel="bet" onclick="switchTab(this)">🎲 BET</button>
    <button class="tab" data-panel="ranking" onclick="switchTab(this)">🏆 RANKING</button>
    <button class="tab" data-panel="admin" onclick="switchTab(this)">⚙ ADMIN</button>
  </div>
  <div id="main">
    <!-- BET PANEL -->
    <div class="panel on" id="panel-bet">
      <div id="topic-nav"></div>
      <div id="bet-content"></div>
    </div>
    <!-- RANKING PANEL -->
    <div class="panel" id="panel-ranking">
      <div class="ranking-wrap">
        <div class="podium-area" id="podium-area"></div>
        <div style="height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:16px 0 12px;"></div>
        <div class="rank-header">
          <span>順位</span><span>チーム</span>
          <span>練習</span><span>G1</span><span>G2</span><span>G3</span><span>G4</span><span>G5</span>
          <span>合計</span>
        </div>
        <div class="rank-list" id="rank-list"></div>
      </div>
    </div>
    <!-- ADMIN PANEL -->
    <div class="panel" id="panel-admin">
      <div class="admin-sec"><div class="admin-ttl">🎴 チーム名</div><div class="form-grid" id="admin-teams"></div><div class="action-bar"><button class="btn btn-gold" onclick="saveTeamNames()">保存</button></div></div>
      <div class="admin-sec"><div class="admin-ttl">📋 お題名</div><div class="form-grid" id="admin-topics"></div><div class="action-bar"><button class="btn btn-gold" onclick="saveTopicNames()">保存</button></div></div>
      <div class="admin-sec"><div class="admin-ttl">👤 出場者設定</div><div id="admin-players"></div><div class="action-bar"><button class="btn btn-gold" onclick="savePlayers()">保存</button></div></div>
      <div class="admin-sec"><div class="admin-ttl">🎯 ハンデ設定</div><div style="font-family:'Courier New',monospace;font-size:10px;color:var(--muted);margin-bottom:10px;">BETリセット時の初期ポイントです</div><div class="form-grid" id="admin-handicap"></div><div class="action-bar"><button class="btn btn-gold" onclick="saveHandicap()">保存</button><button class="btn btn-out" onclick="applyHandicapNow()">今すぐ反映</button></div></div>
      <div class="admin-sec" style="border-color:#883333;"><div class="admin-ttl" style="color:#ff6666;">⚠ データ管理</div><div class="action-bar"><button class="btn btn-red" onclick="resetBets()">BETリセット</button><button class="btn btn-red" onclick="resetAll()">全リセット</button></div></div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
'use strict';

// ============================================================
// ① 定数・DEFをすべて先に定義
// ============================================================
var INIT_PTS  = 400;
var MIN_BET   = 5;
var N_TEAMS   = 33;
var N_TOPICS  = 5;   // お題1〜5（本番）
var N_PLAYERS = 5;
var MATCH_IDX = 4;   // お題5は3択対戦（0始まり）
var DB_PATH   = 'bc_derby';
var MATCH_OPTS = ['A チームの勝ち', 'B チームの勝ち', '引き分け'];

// デフォルト値
var DEF_TEAMS = [];
for (var _i=0; _i<N_TEAMS;  _i++) DEF_TEAMS.push('チーム'+(_i+1));

var DEF_TOPICS = [];
for (var _i=0; _i<N_TOPICS; _i++) DEF_TOPICS.push(_i===MATCH_IDX ? '対戦ゲーム' : 'お題 '+(_i+1));

var DEF_PLAYERS = [];
for (var _i=0; _i<N_TOPICS; _i++){
  var _r = [];
  if (_i===MATCH_IDX){ for(var _j=0;_j<MATCH_OPTS.length;_j++) _r.push(MATCH_OPTS[_j]); }
  else { for(var _j=0;_j<N_PLAYERS;_j++) _r.push('出場者'+String.fromCharCode(65+_j)); }
  DEF_PLAYERS.push(_r);
}

// タブ: 0=練習, 1〜N_TOPICS=本番
var curTopic = 0;
var winTopic = null;

// ============================================================
// ② State
// ============================================================
var S   = null;
var db, fbRef, fbSet, fbGet, fbOnValue, fbReady = false;

function freshState(){
  var bets={};
  for(var t=0;t<N_TOPICS;t++){bets[t]={};for(var tm=0;tm<N_TEAMS;tm++)bets[t][tm]={};}
  return{
    teams:DEF_TEAMS.slice(), topics:DEF_TOPICS.slice(),
    players:DEF_PLAYERS.map(function(a){return a.slice();}),
    bets:bets, points:[], status:[], winners:[], prevRanks:[], handicap:[],
    practice_bets:{}, practice_topic:'練習ゲーム / Practice Game',
    practice_players:['出場者A','出場者B','出場者C','出場者D','出場者E']
  };
}

function repairState(s){
  if(!s) s = freshState();
  // practice_bets
  if(!s.practice_bets) s.practice_bets={};
  for(var tm=0;tm<N_TEAMS;tm++) if(!s.practice_bets[tm]) s.practice_bets[tm]={};
  if(!s.practice_topic)    s.practice_topic='練習ゲーム / Practice Game';
  if(!Array.isArray(s.practice_players)||s.practice_players.length<N_PLAYERS)
    s.practice_players=['出場者A','出場者B','出場者C','出場者D','出場者E'];
  // bets
  if(!s.bets) s.bets={};
  for(var t=0;t<N_TOPICS;t++){
    if(!s.bets[t]) s.bets[t]={};
    for(var tm=0;tm<N_TEAMS;tm++) if(!s.bets[t][tm]) s.bets[t][tm]={};
  }
  // players
  if(!Array.isArray(s.players)||s.players.length<N_TOPICS)
    s.players=DEF_PLAYERS.map(function(a){return a.slice();});
  for(var t=0;t<N_TOPICS;t++){
    if(!Array.isArray(s.players[t])) s.players[t]=DEF_PLAYERS[t].slice();
    var elen=(t===MATCH_IDX)?MATCH_OPTS.length:N_PLAYERS;
    while(s.players[t].length<elen) s.players[t].push(DEF_PLAYERS[t][s.players[t].length]||'選択肢'+(s.players[t].length+1));
  }
  // arrays
  if(!Array.isArray(s.status) ||s.status.length <N_TOPICS) s.status =[];
  if(!Array.isArray(s.winners)||s.winners.length<N_TOPICS) s.winners=[];
  if(!Array.isArray(s.topics) ||s.topics.length <N_TOPICS) s.topics =DEF_TOPICS.slice();
  if(!Array.isArray(s.teams))   s.teams   =DEF_TEAMS.slice();
  if(!Array.isArray(s.points))  s.points  =[];
  if(!Array.isArray(s.prevRanks)) s.prevRanks=[];
  if(!Array.isArray(s.handicap))  s.handicap =[];
  for(var t=0;t<N_TOPICS;t++){
    if(!s.status[t])  s.status[t]='open';
    if(s.winners[t]===undefined) s.winners[t]=null;
  }
  while(s.teams.length    <N_TEAMS) s.teams.push('チーム'+(s.teams.length+1));
  while(s.points.length   <N_TEAMS) s.points.push(INIT_PTS);
  while(s.prevRanks.length<N_TEAMS) s.prevRanks.push(s.prevRanks.length+1);
  while(s.handicap.length <N_TEAMS) s.handicap.push(INIT_PTS);
  if(!s.confirmedOdds) s.confirmedOdds={};
  return s;
}

// ============================================================
// ③ Firebase
// ============================================================
function fbSaveMeta(s){
  if(!fbReady) return;
  var meta={
    status:s.status, winners:s.winners, points:s.points,
    teams:s.teams, topics:s.topics, players:s.players,
    handicap:s.handicap, prevRanks:s.prevRanks,
    practice_topic:s.practice_topic, practice_players:s.practice_players,
    confirmedOdds:s.confirmedOdds||{}
  };
  fbSet(fbRef(db,DB_PATH+'/meta'),{json:JSON.stringify(meta)})
    .then(function(){markSync();})
    .catch(function(e){toast('保存エラー: '+e.message);});
}

function fbListen(){
  if(!fbReady) return;
  fbOnValue(fbRef(db,DB_PATH+'/meta'),function(snap){
    var val=snap.val(); if(!val) return;
    try{
      var meta=JSON.parse(val.json);
      var pr=S?S.prevRanks.slice():null;
      if(meta.status)          S.status          =meta.status;
      if(meta.winners)         S.winners         =meta.winners;
      if(meta.points)          S.points          =meta.points;
      if(meta.teams)           S.teams           =meta.teams;
      if(meta.topics)          S.topics          =meta.topics;
      if(meta.players)         S.players         =meta.players;
      if(meta.handicap)        S.handicap        =meta.handicap;
      if(meta.prevRanks)       S.prevRanks       =meta.prevRanks;
      if(meta.practice_topic)  S.practice_topic  =meta.practice_topic;
      if(meta.practice_players)S.practice_players=meta.practice_players;
      if(meta.confirmedOdds)   S.confirmedOdds   =meta.confirmedOdds;
      if(!meta.prevRanks&&pr)  S.prevRanks=pr;
      renderAll(); markSync();
    }catch(e){toast('⚠ データ更新エラー: '+e.message);}
  });
  fbOnValue(fbRef(db,DB_PATH+'/bets_by_team'),function(snap){
    var val=snap.val(); if(!val) return;
    try{
      for(var tm=0;tm<N_TEAMS;tm++){
        var d=val[tm]; if(!d) continue;
        for(var t=0;t<N_TOPICS;t++) S.bets[t][tm]=d['t'+t]||{};
        if(d['prac']) S.practice_bets[tm]=d['prac'];
      }
      renderTopicNav(); renderBetContent(); renderRanking(); markSync();
    }catch(e){toast('⚠ BETデータ更新エラー: '+e.message);}
  });
}

// ============================================================
// ④ Calc helpers
// ============================================================
function topicTotal(ti){
  var n=0;
  for(var tm=0;tm<N_TEAMS;tm++){var b=S.bets[ti][tm];for(var k in b)n+=(b[k]||0);}
  return n;
}
function playerTotal(ti,pi){var n=0;for(var tm=0;tm<N_TEAMS;tm++)n+=(S.bets[ti][tm][pi]||0);return n;}
function ttTotal(ti,tm){var n=0,b=S.bets[ti][tm];for(var k in b)n+=(b[k]||0);return n;}
function getOdds(ti,pi){var tot=topicTotal(ti),p=playerTotal(ti,pi);return(tot&&p)?tot/p:null;}
function getHandicap(i){return(Array.isArray(S.handicap)&&S.handicap[i]!=null)?S.handicap[i]:INIT_PTS;}
function topicGain(ti,tm){
  var st=S.status[ti],pi=S.winners[ti];
  if(st!=='decided'||pi===null) return null;
  var o=getOdds(ti,pi);
  var bw=(S.bets[ti][tm]||{})[pi]||0;
  var spent=ttTotal(ti,tm);
  return o?Math.round(bw*o)-spent:-spent;
}
// 練習calc
function pracGrandTotal(){
  var n=0;
  for(var tm=0;tm<N_TEAMS;tm++){var b=S.practice_bets[tm];for(var k in b)n+=(b[k]||0);}
  return n;
}
function pracPlayerTotal(pi){var n=0;for(var tm=0;tm<N_TEAMS;tm++)n+=(S.practice_bets[tm][pi]||0);return n;}
function getPracOdds(pi){var tot=pracGrandTotal(),p=pracPlayerTotal(pi);return(tot&&p)?tot/p:null;}

function buildTopicHTML(ti){

  var isMatch=(ti===MATCH_IDX);
  var nOpts=isMatch?MATCH_OPTS.length:N_PLAYERS;
  var stLabel=status==='open'?'● OPEN':status==='closed'?'■ CLOSED':'★ 確定';
  var stClass=status==='open'?'st-open':status==='closed'?'st-closed':'st-decided';
  var matchColors=isMatch?['#d42020','#1a4aaa','#6a8a6a']:null;
  var matchIcons =isMatch?['🔴','🔵','🤝']:null;
  var tabIdx=ti+1;

  var adminBtns='';
  if(status==='open')
    adminBtns='<button class="btn btn-out btn-sm" onclick="setStatus('+tabIdx+',\'closed\')">締切</button>';
  else if(status==='closed')
    adminBtns='<button class="btn btn-gold btn-sm" onclick="openWinModal('+tabIdx+')">結果確定</button>'
      +'<button class="btn btn-out btn-sm" onclick="setStatus('+tabIdx+',\'open\')">再開</button>';
  else
    adminBtns='<button class="btn btn-out btn-sm" onclick="setStatus('+tabIdx+',\'open\')">リセット</button>';

  // オッズバー
  var oddsBar='<div class="odds-bar">';
  for(var pi=0;pi<nOpts;pi++){
    var o=getOdds(ti,pi), pt=playerTotal(ti,pi), isWin=winnerPi===pi;
    var hot=o&&o<2.0, cold=o&&o>5.0;
    var vClass=hot?'odds-card-val hot':cold?'odds-card-val cold':'odds-card-val';
    var bcol=isMatch?matchColors[pi]:(isWin?'var(--gold)':'var(--border)');
    oddsBar+='<div class="odds-card" style="border-color:'+bcol+';">'
      +(isMatch?'<div style="font-size:18px;margin-bottom:2px;">'+matchIcons[pi]+'</div>':'')
      +'<div class="odds-card-name">'+(isWin?'👑 ':'')+esc(players[pi])+'</div>'
      +'<div class="'+vClass+'">'+(o?o.toFixed(2)+'x':'—')+'</div>'
      +'<div class="odds-card-total">'+(pt>0?pt+'pt BET':'BETなし')+'</div>'
      +'</div>';
  }
  oddsBar+='</div>';

  // テーブルヘッダー
  var thPlayers='';
  for(var pi=0;pi<nOpts;pi++){
    var isWin=winnerPi===pi;
    var lbl=isMatch?('<span style="font-size:13px;">'+matchIcons[pi]+'</span><br>'+esc(players[pi])):esc(players[pi]);
    thPlayers+='<th>'+(isWin?'👑 ':'')+lbl+'</th>';
  }

  // チーム行
  var rows='';
  for(var tm=0;tm<N_TEAMS;tm++){
    var bets=S.bets[ti][tm], tmTot=ttTotal(ti,tm);
    var cells='';
    for(var pi=0;pi<nOpts;pi++){
      var v=bets[pi]||0, o2=getOdds(ti,pi);
      var bs=isMatch&&v>0?'border-left:3px solid '+matchColors[pi]+';':'';
      if(v>0){
        cells+='<td style="'+bs+'"><div class="bet-cell-val">'+v+'pt</div>'
          +(o2?'<div class="bet-cell-pred">→+'+Math.round(v*o2)+'pt</div>':'')+'</td>';
      } else {
        cells+='<td><span class="bet-cell-empty">—</span></td>';
      }
    }
    rows+='<tr style="'+(tmTot>0?'':'opacity:.4;')+'">'
      +'<td class="td-team">'+esc(S.teams[tm])+'</td>'+cells
      +'<td style="font-family:\'Courier New\',monospace;font-size:12px;color:var(--gold2);font-weight:700;">'+(tmTot>0?tmTot+'pt':'—')+'</td></tr>';
  }

  // 合計行
  var totCells='';
  for(var pi=0;pi<nOpts;pi++){
    var pt=playerTotal(ti,pi);
    totCells+='<td style="font-family:\'Courier New\',monospace;font-size:11px;color:var(--gold2);">'+(pt>0?pt+'pt':'—')+'</td>';
  }

  // 配当行
  var payRow='';
  if(status==='decided'&&winnerPi!==null){
    var o3=getOdds(ti,winnerPi), c2='';
    for(var tm=0;tm<N_TEAMS;tm++){
      var bw=(S.bets[ti][tm]||{})[winnerPi]||0;
      if(!bw){c2+='<td style="color:var(--muted)">—</td>';continue;}
      c2+='<td><b style="color:var(--ok);">+'+(o3?Math.round(bw*o3):bw)+'pt</b></td>';
    }
    payRow='<tr class="row-payout"><td style="font-size:11px;">💰 配当</td>'+c2+'<td></td></tr>';
  }

  return '<div class="topic-head"><div>'
    +'<div class="topic-num">GAME '+(ti+1)+(isMatch?' ⚔️':'')+'</div>'

    +'<td style="color:var(--gold);font-weight:700;font-family:\'Courier New\',monospace;">'+(tTot>0?tTot+'pt':'—')+'</td></tr>'

// ===== RANKING =====
function renderRanking(){
  var arr=[];
  for(var i=0;i<N_TEAMS;i++) arr.push({n:S.teams[i],i:i,pts:S.points[i]});
  arr.sort(function(a,b){return b.pts-a.pts;});

  // ポジウム
  var podium=document.getElementById('podium-area');
  if(podium&&arr.length>=3){
    var configs=[
      {t:arr[1],cls:'p2',medal:'🥈',rn:2},
      {t:arr[0],cls:'p1',medal:'👑',rn:1},
      {t:arr[2],cls:'p3',medal:'🥉',rn:3}
    ];
    var html='';
    for(var c=0;c<configs.length;c++){
      var cfg=configs[c],t=cfg.t,rn=cfg.rn;
      var prev=S.prevRanks[t.i]||rn, delta=prev-rn;
      var dBadge=delta>0?'<span class="delta delta-up">▲'+delta+'</span>'
        :delta<0?'<span class="delta delta-dn">▼'+Math.abs(delta)+'</span>'
        :'<span class="delta delta-eq">—</span>';
      var gains='';
      for(var ti=0;ti<N_TOPICS;ti++){
        var g=topicGain(ti,t.i);
        if(g===null) gains+='<span style="font-size:9px;color:var(--muted)">G'+(ti+1)+':— </span>';
        else{var col=g>0?'var(--ok)':g<0?'#ff5555':'var(--muted)';gains+='<span style="font-size:9px;color:'+col+'">G'+(ti+1)+':'+(g>0?'+':'')+g+' </span>';}
      }
      html+='<div class="podium-item '+cfg.cls+'">'
        +'<div class="podium-rank">'+cfg.medal+'</div>'
        +'<div class="podium-name">'+esc(t.n)+'</div>'
        +'<div class="podium-pts">'+t.pts+' pt '+dBadge+'</div>'
        +'<div class="podium-gains">'+gains+'</div>'
        +'<div class="podium-base"><span style="font-family:Georgia;font-style:italic;font-size:14px;color:rgba(255,255,255,.3);">'+rn+'</span></div>'
        +'</div>';
    }
    podium.innerHTML=html;
  }

  // 4位以下
  var list=document.getElementById('rank-list'); if(!list) return;
  var html2='';
  for(var r=3;r<arr.length;r++){
    var t=arr[r],rn=r+1;
    var prev=S.prevRanks[t.i]||rn, delta=prev-rn;
    var dBadge2=delta>0?'<span class="delta delta-up">▲'+delta+'</span>'
      :delta<0?'<span class="delta delta-dn">▼'+Math.abs(delta)+'</span>'
      :'<span class="delta delta-eq">—</span>';
    var gainCells='';
    // 練習は損益なし
    gainCells+='<div class="rr-gain gain-na">—</div>';
    for(var ti=0;ti<N_TOPICS;ti++){
      var g=topicGain(ti,t.i);
      if(g===null){gainCells+='<div class="rr-gain gain-na">—</div>';continue;}
      gainCells+='<div class="rr-gain '+(g>0?'gain-up':g<0?'gain-dn':'gain-na')+'">'+(g>0?'+':'')+g+'</div>';
    }
    html2+='<div class="rank-row">'
      +'<div class="rr-num">'+rn+'</div>'
      +'<div class="rr-name">'+esc(t.n)+' '+dBadge2+'</div>'
      +gainCells
      +'<div class="rr-pts">'+t.pts+' pt</div>'
      +'</div>';
  }
  list.innerHTML=html2;
}

// ===== ACTIONS =====
function setStatus(tabIdx,st){
  var ti=tabIdx-1;
  if(st==='open'&&S.status[ti]==='decided'){
    if(!confirm('リセットすると配当も取り消されます。')) return;
    revertPayout(ti);
  }
  S.status[ti]=st;
  if(st!=='decided') S.winners[ti]=null;
  fbSaveMeta(S); renderTopicNav(); renderBetContent();
  toast('GAME '+(ti+1)+': '+(st==='open'?'OPEN':st==='closed'?'締切':'確定'));
}

function openWinModal(tabIdx){
  var ti=tabIdx-1;
  winTopic=ti;
  var isMatch=(ti===MATCH_IDX);
  var nOpts=isMatch?MATCH_OPTS.length:N_PLAYERS;
  var sel=document.getElementById('win-sel');
  var html='';
  for(var pi=0;pi<nOpts;pi++){
    var lbl=isMatch?MATCH_OPTS[pi]:S.players[ti][pi];
    html+='<option value="'+pi+'">'+esc(lbl)+'</option>';
  }
  sel.innerHTML=html;
  document.getElementById('win-modal-body').textContent='GAME '+(ti+1)+': '+S.topics[ti]+(isMatch?' の結果':" の優勝者");
  document.getElementById('win-modal').classList.add('on');
}
function closeWinModal(){document.getElementById('win-modal').classList.remove('on');}

function confirmWin(){
  var ti=winTopic, pi=parseInt(document.getElementById('win-sel').value);
  var o=getOdds(ti,pi);
  var tTot=topicTotal(ti);

  // BETゼロ警告
  if(tTot===0){
    if(!confirm('⚠️ このゲームにBETしたチームがいません。\n確定しますか？（ポイント変動なし）'))return;
  }

  // prevRanks更新
  var now=[]; for(var i=0;i<N_TEAMS;i++) now.push({i:i,pts:S.points[i]});
  now.sort(function(a,b){return b.pts-a.pts;});
  S.prevRanks=new Array(N_TEAMS).fill(0);
  for(var r=0;r<now.length;r++) S.prevRanks[now[r].i]=r+1;

  // 確定時オッズを保存（revertPayout用）
  if(!S.confirmedOdds) S.confirmedOdds={};
  S.confirmedOdds[ti]=o;

  // 配当: 全BET没収 → 正解者のみ配当 → 誰も正解なし(o=null)は全員没収のみ
  for(var tm=0;tm<N_TEAMS;tm++){
    var bw=(S.bets[ti][tm]||{})[pi]||0, tt=ttTotal(ti,tm);
    S.points[tm]-=tt;
    if(bw>0&&o!==null) S.points[tm]+=Math.round(bw*o);
  }
  S.winners[ti]=pi; S.status[ti]='decided';
  closeWinModal(); fbSaveMeta(S); renderAll();
  var msg=o
    ?'👑 結果確定: '+S.players[ti][pi]+' — 配当完了！'
    :'👑 結果確定: '+S.players[ti][pi]+' — 正解者なし・全BET没収';
  toast(msg);
}

function revertPayout(ti){
  var pi=S.winners[ti]; if(pi===null) return;
  // 確定時に保存したオッズで逆算（現在のBETが変わっていても正確に戻せる）
  var o=(S.confirmedOdds&&S.confirmedOdds[ti]!==undefined)
    ?S.confirmedOdds[ti]
    :getOdds(ti,pi);
  for(var tm=0;tm<N_TEAMS;tm++){
    var bw=(S.bets[ti][tm]||{})[pi]||0, tt=ttTotal(ti,tm);
    if(bw>0&&o!==null) S.points[tm]-=Math.round(bw*o);
    S.points[tm]+=tt;
  }
  S.winners[ti]=null;
  if(S.confirmedOdds) delete S.confirmedOdds[ti];
}

function saveTeamNames(){for(var i=0;i<N_TEAMS;i++){var el=document.getElementById('at'+i);if(el&&el.value.trim())S.teams[i]=el.value.trim();}fbSaveMeta(S);renderAll();toast('チーム名を保存しました');}
function saveTopicNames(){for(var i=0;i<N_TOPICS;i++){var el=document.getElementById('atp'+i);if(el&&el.value.trim())S.topics[i]=el.value.trim();}fbSaveMeta(S);renderAll();toast('お題名を保存しました');}
function savePlayers(){
  for(var ti=0;ti<N_TOPICS;ti++){
    var nOpts=(ti===MATCH_IDX)?MATCH_OPTS.length:N_PLAYERS;
    for(var pi=0;pi<nOpts;pi++){var el=document.getElementById('ap'+ti+'_'+pi);if(el&&el.value.trim())S.players[ti][pi]=el.value.trim();}
  }
  fbSaveMeta(S);renderAll();toast('出場者を保存しました');
}
function saveHandicap(){
  if(!Array.isArray(S.handicap)||S.handicap.length<N_TEAMS) S.handicap=new Array(N_TEAMS).fill(INIT_PTS);
  for(var i=0;i<N_TEAMS;i++){var el=document.getElementById('hc'+i);if(el){var v=parseInt(el.value);if(!isNaN(v)&&v>=0)S.handicap[i]=v;}}
  fbSaveMeta(S);toast('ハンデを保存しました');
}
function applyHandicapNow(){
  if(!confirm('全チームのポイントをハンデ値で上書きします。')) return;
  if(!Array.isArray(S.handicap)||S.handicap.length<N_TEAMS) S.handicap=new Array(N_TEAMS).fill(INIT_PTS);
  for(var i=0;i<N_TEAMS;i++) S.points[i]=getHandicap(i);
  fbSaveMeta(S);renderAll();toast('ハンデを反映しました');
}
function resetBets(){
  if(!confirm('全BETとポイントをリセットしますか？')) return;
  for(var t=0;t<N_TOPICS;t++){for(var tm=0;tm<N_TEAMS;tm++)S.bets[t][tm]={};S.status[t]='open';S.winners[t]=null;}
  for(var tm=0;tm<N_TEAMS;tm++) S.practice_bets[tm]={};
  S.points=new Array(N_TEAMS).fill(0).map(function(_,i){return getHandicap(i);});
  S.prevRanks=new Array(N_TEAMS).fill(0).map(function(_,i){return i+1;});
  if(fbReady){for(var tm=0;tm<N_TEAMS;tm++)fbSet(fbRef(db,DB_PATH+'/bets_by_team/'+tm),{ts:Date.now()});}
  fbSaveMeta(S);renderAll();toast('リセット完了');
}
function resetAll(){
  if(!confirm('全データを完全リセットしますか？')) return;
  S=repairState(null);
  if(fbReady){for(var tm=0;tm<N_TEAMS;tm++)fbSet(fbRef(db,DB_PATH+'/bets_by_team/'+tm),{ts:Date.now()});}
  fbSaveMeta(S);renderAll();toast('全リセット完了');
}

// ===== ADMIN RENDER =====
function renderAdminTeams(){
  var el=document.getElementById('admin-teams');if(!el)return;
  var html='';
  for(var i=0;i<N_TEAMS;i++) html+='<div class="form-group"><label class="form-lbl">チーム '+(i+1)+'</label><input class="form-inp" id="at'+i+'" value="'+esc(S.teams[i])+'"/></div>';
  el.innerHTML=html;
}
function renderAdminTopics(){
  var el=document.getElementById('admin-topics');if(!el)return;
  var html='';
  for(var i=0;i<N_TOPICS;i++) html+='<div class="form-group"><label class="form-lbl">GAME '+(i+1)+'</label><input class="form-inp" id="atp'+i+'" value="'+esc(S.topics[i])+'"/></div>';
  el.innerHTML=html;
}
function renderAdminPlayers(){
  var el=document.getElementById('admin-players');if(!el)return;
  var html='';
  for(var ti=0;ti<N_TOPICS;ti++){
    var isMatch=(ti===MATCH_IDX);
    var nOpts=isMatch?MATCH_OPTS.length:N_PLAYERS;
    var row='';
    for(var pi=0;pi<nOpts;pi++){
      var lbl=isMatch?'選択肢'+(pi+1):'出場者'+(pi+1);
      row+='<div class="form-group" style="flex:1;min-width:100px;"><label class="form-lbl">'+lbl+'</label><input class="form-inp" id="ap'+ti+'_'+pi+'" value="'+esc(S.players[ti][pi])+'"/></div>';
    }
    html+='<div style="margin-bottom:12px;"><div style="font-family:\'Trebuchet MS\',sans-serif;font-size:11px;letter-spacing:2px;color:var(--gold2);margin-bottom:6px;">GAME '+(ti+1)+': '+esc(S.topics[ti])+(isMatch?' ⚔️':'')+'</div><div style="display:flex;gap:6px;flex-wrap:wrap;">'+row+'</div></div>';
  }
  el.innerHTML=html;
}
function renderAdminHandicap(){
  var el=document.getElementById('admin-handicap');if(!el)return;
  var html='';
  for(var i=0;i<N_TEAMS;i++) html+='<div class="form-group"><label class="form-lbl">'+esc(S.teams[i])+'</label><input class="form-inp" id="hc'+i+'" type="number" min="0" step="10" value="'+getHandicap(i)+'"/></div>';
  el.innerHTML=html;
}

// ===== UI =====
function switchTab(btn){
  var name=btn.dataset.panel;
  var panels=document.querySelectorAll('.panel');
  for(var i=0;i<panels.length;i++) panels[i].classList.remove('on');
  var tabs=document.querySelectorAll('.tab');
  for(var i=0;i<tabs.length;i++) tabs[i].classList.remove('on');
  var p=document.getElementById('panel-'+name);if(p)p.classList.add('on');
  btn.classList.add('on');
}
var toastTimer=null;
function toast(msg){var el=document.getElementById('toast');if(!el)return;el.innerHTML=msg;el.classList.add('on');clearTimeout(toastTimer);toastTimer=setTimeout(function(){el.classList.remove('on');},2800);}
function markSync(){var el=document.getElementById('last-sync');if(!el)return;var n=new Date();el.textContent='更新: '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');}
function updateClock(){var el=document.getElementById('clock');if(!el)return;var n=new Date();el.textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hideLoader(){var el=document.getElementById('loading');if(!el)return;el.classList.add('hidden');setTimeout(function(){el.style.display='none';},500);}

// ===== INIT =====
document.addEventListener('firebase-ready',function(){
  db=window._fbDb;fbRef=window._fbRef;fbSet=window._fbSet;fbGet=window._fbGet;fbOnValue=window._fbOnValue;fbReady=true;
  var fbSt=document.getElementById('fb-status');
  fbSt.textContent='Firebase ✓';fbSt.classList.add('ok');
  document.getElementById('ld-msg').textContent='データ読込中...';

  fbGet(fbRef(db,DB_PATH+'/meta')).then(function(snap){
    var val=snap.val();
    S=repairState(val?JSON.parse(val.json):null);
    return fbGet(fbRef(db,DB_PATH+'/bets_by_team'));
  }).then(function(snap){
    var val=snap.val();
    if(val){
      for(var tm=0;tm<N_TEAMS;tm++){
        var d=val[tm];if(!d)continue;
        for(var t=0;t<N_TOPICS;t++) S.bets[t][tm]=d['t'+t]||{};
        if(d['prac']) S.practice_bets[tm]=d['prac'];
      }
    }
    renderAll();
    fbListen();
    setInterval(updateClock,1000);
    updateClock();
    hideLoader();
  }).catch(function(e){
    S=repairState(null);
    renderAll();
    hideLoader();
    toast('読み込みエラー: '+e.message);
  });
});

setTimeout(function(){
  if(!fbReady){
    S=repairState(null);renderAll();
    setInterval(updateClock,1000);updateClock();
    hideLoader();toast('Firebase未設定');
  }
},5000);
</script>
